<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="admin.css">
    <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  border: none;
}

input, button{
  cursor: pointer;
}

body {
  font-family: "Stack Sans Text", sans-serif;
  background: radial-gradient(circle at top left, #0a0a0a, #111111);
  color: #f5f5f5;
  min-height: 100vh;
}

.login-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.login-box {
  width: 380px;
  background: rgba(10, 10, 10, 0.95);
  padding: 50px 40px;
  border-radius: 6px;
  border: 1px solid #8c6b1f;
  text-align: center;
}

.login-box h2 {
  color: #8c6b1f;
  font-weight: 300;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 30px;
}

.login-box input {
  width: 100%;
  background: transparent;
  border-bottom: 1px solid #8c6b1f;
  margin-bottom: 25px;
  padding: 10px 0;
  color: #f5f5f5;
  font-size: 14px;
  outline: none;
  transition: 0.3s;
}

.login-box input:focus {
  border-bottom-color: #ffffff;
}

.login-box button {
  width: 100%;
  background: #8c6b1f;
  color: #000;
  padding: 15px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 12px;
  margin-top: 10px;
  transition: 0.3s;
}

.login-box button:hover {
  background: #000;
  color: #8c6b1f;
  border: 1px solid #8c6b1f;
}

#errorMsg {
  color: #8c6b1f;
  margin-top: 10px;
  font-size: 13px;
}

.hidden {
  display: none;
}

#adminPanel {
  padding: 60px 20px;
}

.dashboard {
  max-width: 1200px;
  margin: 40px auto;
  background: rgba(255, 255, 255, 0.02);
  padding: 40px;
  border: 1px solid #8c6b1f;
  border-radius: 6px;
}

.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  border-bottom: 1px solid #8c6b1f;
  padding-bottom: 15px;
}

.dashboard-header h2 {
  font-weight: 200;
  font-size: 2rem;
  color: #8c6b1f;
}

#logoutBtn {
  background: #8c6b1f;
  color: #000;
  border: none;
  padding: 8px 20px;
  border-radius: 4px;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s;
}

#logoutBtn:hover {
  background: #000;
  color: #8c6b1f;
  border: 1px solid #8c6b1f;
}

.add-form {
  width: 100%;
  margin-bottom: 50px;
  background: transparent;
  border: 1px solid #8c6b1f;
}

.add-form input {
  background: transparent;
  border-right: 1px solid #8c6b1f;
  color: #f5f5f5;
  padding: 15px;
  font-size: 14px;
  outline: none;
}

.add-form button {
  background: #8c6b1f;
  color: #000;
  text-transform: uppercase;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  padding: 12px 25px;
  border-radius: 4px;
}

.add-form button:hover {
  background: #000;
  color: #8c6b1f;
  border: 1px solid #8c6b1f;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 20px;
  color: #8c6b1f;
  border-bottom: 1px solid #8c6b1f;
  font-weight: 400;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 1px;
}

td {
  padding: 20px;
  border-bottom: 1px solid rgba(140, 107, 31, 0.2);
  color: #f5f5f5;
  font-size: 0.95rem;
}

tr:hover {
  background: rgba(140, 107, 31, 0.05);
}

.edit-btn {
  background: transparent;
  border: 1px solid #8c6b1f;
  color: #f5f5f5;
  padding: 8px 15px;
  font-size: 11px;
  text-transform: uppercase;
  cursor: pointer;
  margin-right: 5px;
  transition: 0.3s;
}

.edit-btn:hover {
  background: #8c6b1f;
  color: #000;
}

.admindlt {
  background: transparent;
  border: 1px solid #8c6b1f;
  color: #f5f5f5;
  padding: 8px 15px;
  font-size: 11px;
  text-transform: uppercase;
  cursor: pointer;
  transition: 0.3s;
}

.admindlt:hover {
  background: #8c6b1f;
  color: #000;
}
@media screen and (max-width: 600px) {

  .login-box {
    width: 90%;
    padding: 40px 25px;
  }

  .dashboard {
    padding: 20px;
    margin: 20px auto;
  }

  .dashboard-header {
    flex-direction: column;
    gap: 20px;
    text-align: center;
  }

  .dashboard-header h2 {
    font-size: 1.5rem;
  }

  .add-form {
    display: flex;
    flex-direction: column;
    border: none;
  }

  .add-form input {
    border: 1px solid #8c6b1f;
    border-radius: 4px;
    margin-bottom: 10px;
    width: 100%;
    padding: 12px;
  }

  .add-form button {
    width: 100%;
    padding: 15px;
  }

  table, thead, tbody, th, td, tr {
    display: block;
    width: 100%;
  }

  thead {
    display: none;
  }

  tr {
    border: 1px solid #8c6b1f;
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.02);
  }

  td {
    border: none;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  td::before {
    content: attr(data-label);
    font-weight: 700;
    text-transform: uppercase;
    color: #8c6b1f;
    font-size: 11px;
    min-width: 120px;
  }

  td span, td {
    word-break: break-word;
  }

  td:last-child {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding-top: 15px;
    border-top: 1px solid #8c6b1f;
    margin-top: 10px;
  }

  .edit-btn, .admindlt {
    flex: 1;
    text-align: center;
    margin: 0;
  }
}

    </style>
</head>
<body>
<section class="admin-body">
<div class="login-wrapper">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter password">
    <button id="loginBtn">Login</button>
    <p id="errorMsg"></p>
  </div>
</div>

<section id="adminPanel" class="hidden">
  <div class="dashboard">
    <div class="dashboard-header">
      <h2>Guests List</h2>
      <button id="logoutBtn">Logout</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Gmail</th>
          <th>Room</th>
          <th>Days</th>
          <th>Phone</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
     <div class="add-form">
  <input type="text" id="newName" placeholder="Name">
  <input type="text" id="newRoom" placeholder="Room">
  <input type="number" id="newDays" placeholder="Days">
  <button id="addBtn">Add</button>
</div>   
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>
</section>

<script src="admin.js"></script>

</body>
</html>
